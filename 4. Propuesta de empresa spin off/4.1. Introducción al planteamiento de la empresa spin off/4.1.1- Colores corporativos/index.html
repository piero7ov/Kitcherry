<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Kitcherry</title>

    <style>
        body {
            margin: 0;
            background: #000;
            font-family: Arial, Helvetica, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .container {
            display: flex;
            align-items: center;
            gap: 60px;
        }

        .circles {
            position: relative;
            width: 300px;
            height: 200px;
        }

        .circle {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            position: absolute;
            top: 10px;
        }

        .circle.left {
            background: #d9d9d9;
            left: 0;
        }

        .circle.right {
            background: #d6001c;
            left: 100px;
        }

        .text {
            color: white;
        }

        .title {
            font-size: 64px;
            font-weight: bold;
            margin: 0;
        }

        .title span:first-child {
            color: #ffffff;
        }

        .title span:last-child {
            color: #d6001c;
        }

        .subtitle {
            margin-top: 10px;
            font-size: 28px;
            color: #cccccc;
        }

        .highlight {
            color: #d6001c;
            font-weight: bold;
        }
    </style>

</head>

<body>

    <div class="container">

        <div class="circles">
            <div class="circle left"></div>
            <div class="circle right"></div>
        </div>

        <div class="text">
            <h1 class="title">
                <span>Kit</span><span>cherry</span>
            </h1>
            <div class="subtitle">
                Herramientas para<br>
                <span class="highlight">Hostelería</span>
            </div>
        </div>

    </div>

</body>

</html>
