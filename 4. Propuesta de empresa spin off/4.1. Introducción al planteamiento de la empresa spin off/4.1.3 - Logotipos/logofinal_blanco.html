<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitcherry - Branding fondo blanco</title>

    <style>
        @font-face {
            font-family: "Coolvetica";
            src: url("fuente/Coolvetica Rg.otf") format("opentype");
            font-weight: normal;
            font-style: normal;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            background-color: #FFFFFF;
            color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            font-family: Arial, sans-serif;
        }

        .branding {
            text-align: center;
            max-width: 900px;
            width: 100%;
        }

        .logo {
            width: 320px;
            max-width: 90%;
            height: auto;
            display: block;
            margin: 0 auto 28px auto;
        }

        .marca {
            font-family: "Coolvetica", Arial, sans-serif;
            font-size: clamp(3rem, 8vw, 6rem);
            line-height: 0.95;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .marca .kit {
            color: #000000;
        }

        .marca .cherry {
            color: #C2182B;
        }

        .subtitulo {
            font-family: "Coolvetica", Arial, sans-serif;
            font-size: clamp(1.1rem, 2.3vw, 2rem);
            color: #000000;
            letter-spacing: 0.5px;
        }

        .horizontal {
            margin-top: 60px;
            padding-top: 40px;
            border-top: 1px solid rgba(0, 0, 0, 0.12);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 28px;
            flex-wrap: wrap;
        }

        .horizontal .logo {
            width: 180px;
            margin: 0;
        }

        .horizontal-texto {
            text-align: left;
        }

        .horizontal .marca {
            margin-bottom: 8px;
            font-size: clamp(2.2rem, 5vw, 4.5rem);
        }

        .horizontal .subtitulo {
            font-size: clamp(1rem, 2vw, 1.6rem);
        }

        @media (max-width: 700px) {
            .horizontal {
                flex-direction: column;
            }

            .horizontal-texto {
                text-align: center;
            }
        }
    </style>
</head>

<body>

    <main class="branding">
        <img src="logo/logo2.png" alt="Logo de Kitcherry" class="logo">

        <h1 class="marca">
            <span class="kit">KIT</span><span class="cherry">CHERRY</span>
        </h1>

        <p class="subtitulo">Herramientas para hostelería</p>

        <section class="horizontal">
            <img src="logo/logo2.png" alt="Logo de Kitcherry" class="logo">

            <div class="horizontal-texto">
                <h2 class="marca">
                    <span class="kit">KIT</span><span class="cherry">CHERRY</span>
                </h2>
                <p class="subtitulo">Herramientas para hostelería</p>
            </div>
        </section>
    </main>

</body>

</html>
