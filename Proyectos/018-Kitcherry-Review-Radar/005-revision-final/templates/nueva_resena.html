{% extends "base.html" %}

{% block content %}

<section class="form-layout">
    <article class="form-intro">
        <p class="eyebrow">Nueva opinión</p>
        <h1>Añadir reseña manualmente</h1>
        <p>
            Registra una opinión de cliente para analizarla desde el panel.
            Puedes copiar reseñas de distintas fuentes de forma manual.
        </p>
    </article>

    <article class="form-card">
        <form action="{{ url_for('nueva_resena') }}" method="POST">

            <div class="form-grid">
                <div class="field">
                    <label for="autor">Autor</label>
                    <input type="text" id="autor" name="autor" value="{{ datos.get('autor', '') }}"
                        placeholder="Ejemplo: Cliente 1" required>
                </div>

                <div class="field">
                    <label for="puntuacion">Puntuación</label>
                    <select id="puntuacion" name="puntuacion" required>
                        <option value="">Selecciona</option>
                        {% for n in range(1, 6) %}
                        <option value="{{ n }}" {% if datos.get('puntuacion')==n|string %}selected{% endif %}>
                            {{ n }}/5
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="field">
                    <label for="origen">Origen</label>
                    <select id="origen" name="origen" required>
                        {% set origen_actual = datos.get('origen', '') %}

                        <option value="">Selecciona</option>
                        <option value="Google" {% if origen_actual=="Google" %}selected{% endif %}>Google</option>
                        <option value="TripAdvisor" {% if origen_actual=="TripAdvisor" %}selected{% endif %}>TripAdvisor
                        </option>
                        <option value="Instagram" {% if origen_actual=="Instagram" %}selected{% endif %}>Instagram
                        </option>
                        <option value="Facebook" {% if origen_actual=="Facebook" %}selected{% endif %}>Facebook</option>
                        <option value="Formulario web" {% if origen_actual=="Formulario web" %}selected{% endif %}>
                            Formulario web</option>
                        <option value="Reseña interna" {% if origen_actual=="Reseña interna" %}selected{% endif %}>
                            Reseña interna</option>
                    </select>
                </div>

                <div class="field">
                    <label for="fecha">Fecha</label>
                    <input type="date" id="fecha" name="fecha" value="{{ datos.get('fecha', hoy) }}" required>
                </div>
            </div>

            <div class="field">
                <label for="texto">Texto de la reseña</label>
                <textarea id="texto" name="texto" rows="7" placeholder="Escribe o pega aquí la reseña del cliente..."
                    required>{{ datos.get('texto', '') }}</textarea>
            </div>

            <div class="form-actions">
                <a href="{{ url_for('index') }}" class="btn btn-light">Cancelar</a>
                <button type="submit" class="btn btn-primary">Guardar reseña</button>
            </div>

        </form>
    </article>
</section>

{% endblock %}
